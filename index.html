<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نظام الأصول الثابتة</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; padding:20px; }
    .box { background:#fff; padding:20px; max-width:500px; margin:auto; border-radius:10px; }
    input { width:90%; padding:10px; margin:10px 0; }
    button { padding:10px 20px; margin:5px; cursor:pointer; }
    #app { display:none; }
    table { width:100%; margin-top:10px; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>تسجيل الدخول</h2>
  <input id="email" placeholder="البريد الإلكتروني">
  <input id="password" type="password" placeholder="كلمة المرور">

  <br>
  <button onclick="login()">دخول</button>
  <button onclick="register()">تسجيل</button>

  <p id="msg"></p>
</div>

<!-- APP -->
<div class="box" id="app">
  <h2>لوحة التحكم</h2>
  <p>مرحباً 👋 تم تسجيل الدخول</p>
  <button onclick="logout()">تسجيل خروج</button>

  <hr>

  <h3>إضافة أصل</h3>

  <input id="assetName" placeholder="اسم الأصل">
  <input id="assetCode" placeholder="كود الأصل">
  <button onclick="addAsset()">إضافة</button>

  <h3>الأصول</h3>

  <table border="1">
    <thead>
      <tr>
        <th>الاسم</th>
        <th>الكود</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody id="assetsTable"></tbody>
  </table>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyB8EYKmTyObV0m4V0XIHxYrt4aKRhbTyB8",
  authDomain: "ifrs-financial-statement-ee7ea.firebaseapp.com",
  projectId: "ifrs-financial-statement-ee7ea",
  storageBucket: "ifrs-financial-statement-ee7ea.firebasestorage.app",
  messagingSenderId: "149527869862",
  appId: "1:149527869862:web:bf76f92fd614d5eb66b767"
};

/* Init */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.register = async function () {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    msg("تم إنشاء الحساب");
  } catch (e) {
    msg(e.message);
  }
};

window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    msg(e.message);
  }
};

window.logout = async function () {
  await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    appBox.style.display = "block";
    loadAssets();
  } else {
    loginBox.style.display = "block";
    appBox.style.display = "none";
  }
});

/* FIRESTORE */
window.addAsset = async function () {
  await addDoc(collection(db, "assets"), {
    name: assetName.value,
    code: assetCode.value,
    createdAt: Date.now()
  });

  assetName.value = "";
  assetCode.value = "";

  loadAssets();
};

async function loadAssets() {
  const snap = await getDocs(collection(db, "assets"));

  let rows = "";

  snap.forEach((d) => {
    rows += `
      <tr>
        <td>${d.data().name}</td>
        <td>${d.data().code}</td>
        <td><button onclick="deleteAsset('${d.id}')">حذف</button></td>
      </tr>
    `;
  });

  assetsTable.innerHTML = rows;
}

window.deleteAsset = async function (id) {
  await deleteDoc(doc(db, "assets", id));
  loadAssets();
};

/* Helpers */
function msg(t){ document.getElementById("msg").innerText = t; }

</script>

</body>
</html>
