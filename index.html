<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نظام الأصول الثابتة</title>

  <style>
    body { margin:0; font-family: Arial; background:#f4f6f9; }

    .login {
      max-width:400px;
      margin:100px auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    input, button {
      width:90%;
      padding:10px;
      margin:8px 0;
    }

    button {
      cursor:pointer;
      background:#007bff;
      color:#fff;
      border:none;
      border-radius:5px;
    }

    /* Dashboard */
    #appBox { display:none; }

    .sidebar {
      width:200px;
      background:#1e293b;
      color:#fff;
      height:100vh;
      position:fixed;
      top:0;
      right:0;
      padding:20px;
    }

    .content {
      margin-right:220px;
      padding:20px;
    }

    table {
      width:100%;
      background:#fff;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border:1px solid #ddd;
    }

    .card {
      background:#fff;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>تسجيل الدخول</h2>

  <input id="email" placeholder="البريد الإلكتروني">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <button onclick="register()">تسجيل</button>

  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="appBox">

  <div class="sidebar">
    <h3>نظام الأصول</h3>
    <p id="userEmail"></p>
    <button onclick="logout()">خروج</button>
  </div>

  <div class="content">

    <div class="card">
      <h2>📊 لوحة التحكم</h2>
      <p>عدد الأصول: <span id="count">0</span></p>
    </div>

    <div class="card">
      <h3>➕ إضافة أصل</h3>
      <input id="assetName" placeholder="اسم الأصل">
      <input id="assetCode" placeholder="كود الأصل">
      <button onclick="addAsset()">إضافة</button>
    </div>

    <div class="card">
      <h3>🔎 بحث</h3>
      <input id="search" placeholder="ابحث..." oninput="filterAssets()">
    </div>

    <div class="card">
      <h3>📦 الأصول</h3>

      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>الكود</th>
            <th>حذف</th>
          </tr>
        </thead>
        <tbody id="assetsTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyB8EYKmTyObV0m4V0XIHxYrt4aKRhbTyB8",
  authDomain: "ifrs-financial-statement-ee7ea.firebaseapp.com",
  projectId: "ifrs-financial-statement-ee7ea",
  storageBucket: "ifrs-financial-statement-ee7ea.firebasestorage.app",
  messagingSenderId: "149527869862",
  appId: "1:149527869862:web:bf76f92fd614d5eb66b767"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let assetsData = [];

/* LOGIN */
window.register = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    msg("تم إنشاء الحساب");
  } catch (e) {
    msg(e.message);
  }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    msg(e.message);
  }
};

window.logout = () => signOut(auth);

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    appBox.style.display = "block";
    userEmail.innerText = user.email;
    loadAssets();
  } else {
    loginBox.style.display = "block";
    appBox.style.display = "none";
  }
});

/* ADD ASSET */
window.addAsset = async () => {
  await addDoc(collection(db, "assets"), {
    name: assetName.value,
    code: assetCode.value,
    createdAt: Date.now()
  });

  assetName.value = "";
  assetCode.value = "";

  loadAssets();
};

/* LOAD */
async function loadAssets() {
  const snap = await getDocs(collection(db, "assets"));

  assetsData = [];

  snap.forEach(d => {
    assetsData.push({ id: d.id, ...d.data() });
  });

  render(assetsData);
  count.innerText = assetsData.length;
}

/* DELETE */
window.deleteAsset = async (id) => {
  await deleteDoc(doc(db, "assets", id));
  loadAssets();
};

/* RENDER */
function render(data) {
  let rows = "";

  data.forEach(a => {
    rows += `
      <tr>
        <td>${a.name}</td>
        <td>${a.code}</td>
        <td><button onclick="deleteAsset('${a.id}')">حذف</button></td>
      </tr>
    `;
  });

  assetsTable.innerHTML = rows;
}

/* SEARCH */
window.filterAssets = () => {
  const q = search.value.toLowerCase();
  const filtered = assetsData.filter(a =>
    a.name.toLowerCase().includes(q) ||
    a.code.toLowerCase().includes(q)
  );

  render(filtered);
};

/* MSG */
function msg(t){ msgBox.innerText = t; }

</script>

</body>
</html>
